agent_protocol:
  required_reading:
  - Repository root AGENTS.md and the canonical rule hierarchy established by the prior governance task.
  - The complete HTML finding linked by task.finding, including evidence, impact, and required change.
  - The entire YAML task, every dependency output, and every path in read_first.
  - Relevant package CONTEXT.md, README.md, configuration, migrations, models, callers, and existing tests before editing.
  claim_sequence:
  - Pull or merge the newest prior and new tracker files.
  - Run the validator with --prior-tracker.
  - Confirm all depends_on and prior_dependencies tasks are done and merged.
  - Set owner, branch, claimed_at, and status=claimed in one tracker-only commit.
  - Run the validator again before changing repository source.
  implementation_sequence:
  - Reproduce or characterize the defect with a failing test before changing implementation whenever technically possible.
  - Edit only exclusive_scope paths. If another path is genuinely required, block the task and amend the tracker before touching it.
  - Implement the destructive target design directly. Remove superseded columns, commands, flags, aliases, accessors, adapters, and tests.
  - Update package documentation and CONTEXT.md in the same task when behavior or domain language changes.
  - Run targeted tests first, then package static analysis/style, then the required repository gates.
  prohibited_globally:
  - No compatibility aliases, dual reads, dual writes, fallback branches, deprecated command names, legacy schema columns, or shadow 
    implementations.
  - No fabricated test output, skipped acceptance item, silent catch, unbounded retry, raw secret logging, or unrelated cleanup.
  - No source edit while a prior or new active task owns an overlapping path.
  - No task may be marked done while required dynamic verification is unavailable; use blocked with exact evidence instead.
  completion_evidence:
  - Commit SHA containing the implementation and same-pass documentation.
  - Exact targeted test commands and outputs.
  - Exact Pint/Rector/PHPStan commands and outputs for affected packages.
  - Security or concurrency evidence where the task acceptance requires it.
  - Independent reviewer identity and review notes.
  standard_commands:
  - python3 validate-commerce-full-audit-tracker.py commerce-full-audit-tracker-20260713.yaml --prior-tracker 
    architecture-execution-tracker-20260712.yaml
  - git diff --check
  - vendor/bin/pint --test <changed PHP paths>
  - vendor/bin/rector process --dry-run <changed package paths>
  - vendor/bin/phpstan analyse <changed package paths>
  - vendor/bin/pest <task verification.test_targets>
