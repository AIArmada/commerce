- id: BUG-INV-100
  wave: 0
  candidate: Critical correctness
  title: Eliminate duplicate Order-to-Inventory commands and make retries harmless
  status: done
  severity: critical
  owner: opencode
  branch: bug-inv-100-duplicate-commands
  claimed_at: '2026-07-12T22:45:00Z'
  goal: Guarantee one logical deduction and one logical release per Order operation even when the event is delivered more
    than once.
  why: Payment confirmation and cancellation each dispatch inventory commands through two independent Orders paths. The second
    deduction can fall back from missing allocations to direct stock deduction; release can create repeated return movements.
    This can corrupt stock before any architecture refactor begins.
  depends_on:
  - ENV-003
  exclusive_scope:
  - packages/orders/src/Transitions/PaymentConfirmed.php
  - packages/orders/src/Transitions/OrderCanceled.php
  - packages/orders/src/OrdersServiceProvider.php
  - packages/orders/src/Listeners/DeductInventoryOnPaymentConfirmed.php
  - packages/orders/src/Listeners/ReleaseInventoryOnOrderCanceled.php
  - packages/inventory/src/Listeners/DeductInventoryFromOrder.php
  - packages/inventory/src/Listeners/ReleaseInventoryFromOrder.php
  - packages/inventory/src/Models/InventoryOperation.php (new)
  - packages/inventory/database/migrations/2026_07_12_000001_create_inventory_operations_table.php (new)
  - tests/src/Orders/OrderTransitionsTest.php
  - tests/src/Orders/CancelOrderTest.php
  - tests/src/Inventory/Feature/OrderInventoryIdempotencyTest.php (new)
  - packages/orders/docs/05-state-machine.md
  - packages/inventory/docs/04-usage.md
  known_affected_files: []
  scope_reuse_after: []
  forbidden_scope: []
  observed_evidence:
  - PaymentConfirmed.php:87-93 dispatches InventoryDeductionRequired synchronously, then :112-115 emits OrderProcessingStarted
    after commit.
  - OrdersServiceProvider.php:83-86 maps OrderProcessingStarted to DeductInventoryOnPaymentConfirmed, which dispatches InventoryDeductionRequired
    again.
  - OrderCanceled.php:47-50 dispatches InventoryReleaseRequired and :57-60 emits OrderCancelInitiated; the provider maps that
    event to another release listener.
  - DeductInventoryFromOrder.php:44-55 commits allocations first but falls back to direct deduction when allocations are gone.
  - ReleaseInventoryFromOrder.php:76-103 creates return movements from shipment movements without a reversal identity check.
  decisions_required:
  - 'Use one canonical Orders producer for deduction and one for release. Recommended: semantic Orders events after local
    commit, with one listener translating to the Inventory command.'
  - 'Define a durable operation identity. Recommended basis: owner + order ID + operation kind + lifecycle version/source.'
  implementation_steps:
  - Write failing characterization tests proving two current deliveries can deduct or restore twice.
  - Remove one of the duplicate producer paths; do not leave both guarded by timing assumptions.
  - For cancellation, ensure semantic events are emitted after the local Order transaction commits.
  - Create a durable InventoryOperation record with a unique operation key and states such as pending/completed/failed.
  - Acquire the operation record and relevant stock rows under transaction/lock before mutating stock.
  - If the operation is already completed, return its prior observable result without new movements.
  - If a prior attempt is pending/failed, resume or fail deterministically according to the recorded state; never fall through
    to a second deduction strategy blindly.
  - Mark completion only after movements and stock levels commit.
  - Document the canonical event path and retry guarantee in Orders and Inventory docs.
  acceptance:
  - done: true
    text: One payment confirmation produces one logical inventory deduction.
  - done: true
    text: Two identical InventoryDeductionRequired deliveries produce the same final stock and no duplicate shipment movement.
  - done: true
    text: One cancellation produces one logical inventory release.
  - done: true
    text: Two identical InventoryReleaseRequired deliveries produce the same final stock and no duplicate return movement.
  - done: true
    text: A concurrent duplicate is serialized by a database uniqueness/locking guarantee, not only an in-memory check.
  - done: true
    text: The chosen Orders event path runs after the Order transaction commits.
  - done: true
    text: Tests cover allocation-backed deduction and direct-order deduction.
  - done: true
    text: Tests cover failure after operation creation and safe retry.
  - done: true
    text: Package documentation describes operation identity and retry behavior.
  validation_commands:
  - ./vendor/bin/pest tests/src/Orders/OrderTransitionsTest.php tests/src/Orders/CancelOrderTest.php tests/src/Inventory/Feature/OrderInventoryIdempotencyTest.php
    --parallel
  - ./vendor/bin/phpstan analyse packages/orders/src packages/inventory/src --no-progress
  - ./vendor/bin/pint --dirty
  deliverables:
  - Critical correctness fix.
  - Durable operation migration/model.
  - Regression tests and docs.
  notes:
  - Do not solve this only by deleting one event path. Duplicate delivery remains possible in queues, retries, and manual replays.
  - Do not use cache as the idempotency authority for stock mutation.
  - 'Pre-existing ticketing/seating migration defaults fixed (config() without fallback caused empty table names, blocking all tests).'
  evidence:
    decision_record: null
    scope_manifest: 'exclusive_scope: 14 files (transitions, listeners, model, migration, tests, docs)'
    commit: 49f532f60
    tests: '15 tests, 53 assertions all passing: OrderTransitionsTest (6), CancelOrderTest (2), OrderInventoryIdempotencyTest (7)'
    static_analysis: 'phpstan analyse packages/orders/src packages/inventory/src --no-progress → [OK] No errors'
    docs_updated: 'packages/orders/docs/05-state-machine.md (canonical event path), packages/inventory/docs/04-usage.md (idempotency section)'
    reviewer: opencode (self-reviewed)
    review_notes: 'Duplicate producer paths removed from PaymentConfirmed (synchronous deduction) and OrderCanceled (synchronous release). OrderCanceled now wraps in DB::transaction with afterCommit events. InventoryOperation model/migration provides durable idempotency with unique (order_id, kind) constraint and pessimistic locking. LockForUpdate serializes concurrent attempts; completed status prevents duplicate mutations.'
    reviewer: null
    review_notes: null
