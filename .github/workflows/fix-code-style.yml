name: check-code-style

on:
  push:
    branches: ['**']
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'pint.json'
      - 'rector.php'
      - '.github/workflows/fix-code-style.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'pint.json'
      - 'rector.php'
      - '.github/workflows/fix-code-style.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-code-style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, pdo, pgsql, json
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"http-basic":{"packages.filamentphp.com":{"username":"${{ secrets.COMPOSER_AUTH_USERNAME }}","password":"${{ secrets.COMPOSER_AUTH_PASSWORD }}"}}}'
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Determine changed PHP files
        id: changed-files
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git ls-files -z -- '*.php' > /tmp/changed-php-files
          else
            git diff --name-only --diff-filter=ACMR -z "$BASE_SHA" "$HEAD_SHA" -- '*.php' > /tmp/changed-php-files
          fi

          if [ ! -s /tmp/changed-php-files ]; then
            echo "has_php_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_php_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed PHP files:"
          tr '\0' '\n' < /tmp/changed-php-files

      - name: Check Pint on changed PHP files
        if: steps.changed-files.outputs.has_php_changes == 'true'
        run: xargs -0 vendor/bin/pint --test < /tmp/changed-php-files

      - name: Check Rector on changed PHP files
        if: steps.changed-files.outputs.has_php_changes == 'true'
        run: xargs -0 vendor/bin/rector process --dry-run --no-progress-bar < /tmp/changed-php-files
