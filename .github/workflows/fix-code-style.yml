name: fix-code-style

on:
  push:
    branches-ignore: [main, develop]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'pint.json'
      - 'rector.php'
      - '.github/workflows/fix-code-style.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**/*.php'
      - 'composer.json'
      - 'composer.lock'
      - 'pint.json'
      - 'rector.php'
      - '.github/workflows/fix-code-style.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fix-code-style:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository))
    env:
      TARGET_REF: ${{ github.head_ref || github.ref_name }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_REF }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, pdo, pdo_sqlite, json
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint (fix)
        run: vendor/bin/pint

      - name: Run Rector (fix)
        run: vendor/bin/rector --no-progress-bar

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No code style changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(style): apply Pint and Rector"
          git push origin HEAD:${TARGET_REF}

  # Note: check-pint and check-rector jobs removed - now handled by ci.yml
